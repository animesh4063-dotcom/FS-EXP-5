server.port=8081
# 1. MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/fs_exp_6_db?createDatabaseIfNotExist=true
spring.datasource.username=root
# IMPORTANT: Change "password" below to the exact Root password you created in the installer!
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate Configuration (This tells Hibernate to auto-create our tables)
spring.jpa.hibernate.ddl-auto=update

# 3. Show and Format SQL in the Terminal (Crucial for Part C of your experiment)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true